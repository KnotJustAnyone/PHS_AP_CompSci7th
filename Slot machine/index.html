<!DOCTYPE html>
<html lang="en">
<head>
  
  <style>
    .container{
      display: flex;
      gap: 15px;
      margin-bottom: 15px;
      
   .number-box {
     width: 100px;
     height: 100px;
     border: 3px solid black;
     display: flex;
     align-items: center;
     justify-content: center;
     font-size: 36px;
     font-weight: bold;
     color: black;
   }
  </style>
</head>
<body>

<div class="container" id="container"></div>
<button onclick="generateNumbers()">Gamble</button>
  
<script>
  function generateNumbers(){
    const container = document.getElementById("container");
    container.innerHTML = "";

    // keep track of the numbers we generate so we can check for a win
    const numbers = [];

    for (let i = 0; i < 3; i++){
      const box = document.createElement("div");
      box.className = "number-box";
      
      const randomNumber = Math.floor(Math.random() * 7) + 1;
      box.textContent = randomNumber;
      numbers.push(randomNumber);

      container.appendChild(box);
    }

    // after we've filled the three boxes, see if the player won
    win(numbers);
  }

  function win(numbers) {
    if (numbers[0] === numbers[1] && numbers[1] === numbers[2]) {
        alert('🎉 You win! All three numbers are the same!');
    }
}
  generateNumbers();
</script>
  
</body>
</html>
